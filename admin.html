<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Tech Academy - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Sidebar / Nav -->
    <nav class="bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 text-indigo-600 font-extrabold text-2xl tracking-tighter">
            <span class="bg-indigo-600 text-white px-2 py-1 rounded-lg">HI</span>
            <span>TECH</span>
            <span class="text-slate-400 text-sm font-bold ml-2 uppercase tracking-widest">ADMIN</span>
        </div>
        <div class="flex items-center gap-6">
            <a href="./profile.html" class="text-slate-600 font-bold text-sm hover:text-indigo-600 transition-colors uppercase tracking-widest">Profile</a>
            <span id="user-email" class="text-slate-500 font-medium text-sm hidden md:block"></span>
            <button onclick="window.logout()" class="text-red-500 font-bold text-sm hover:text-red-700 transition-colors uppercase tracking-widest">LOGOUT</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid lg:grid-cols-3 gap-8">
        <!-- Upload Form -->
        <div class="lg:col-span-1 space-y-8">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 class="text-2xl font-black text-slate-900 tracking-tighter mb-6 uppercase">UPLOAD CONTENT</h2>
                <form id="upload-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-widest">Title</label>
                        <input type="text" id="title" required class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium" placeholder="Lesson Title">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-widest">Type</label>
                        <select id="type" required class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium appearance-none">
                            <option value="pdf">PDF (Book)</option>
                            <option value="video">Video</option>
                            <option value="image">Image</option>
                            <option value="text">Announcement</option>
                            <option value="question">Question</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-widest">Audience</label>
                        <select id="audience" required class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium appearance-none">
                            <option value="all">All</option>
                            <option value="student">Student</option>
                            <option value="teacher">Teacher</option>
                        </select>
                    </div>
                    <div id="file-input-container">
                        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-widest">File URL (Optional)</label>
                        <input type="url" id="file_url" placeholder="https://example.com/file.pdf" class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium">
                    </div>
                    <button type="submit" id="upload-btn" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-lg hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100">
                        UPLOAD
                    </button>
                </form>
                <div id="upload-status" class="mt-4 text-sm font-bold text-center hidden"></div>
            </div>
        </div>

        <!-- Content Lists -->
        <div class="lg:col-span-2 space-y-8">
            <!-- Posts List -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 class="text-2xl font-black text-slate-900 tracking-tighter mb-6 uppercase">UPLOADED CONTENT</h2>
                <div id="posts-list" class="space-y-4">
                    <p class="text-slate-400 font-medium text-center py-10">Loading content...</p>
                </div>
            </div>

            <!-- Users List -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 class="text-2xl font-black text-slate-900 tracking-tighter mb-6 uppercase">USERS LIST</h2>
                <div id="users-list" class="space-y-4">
                    <p class="text-slate-400 font-medium text-center py-10">Loading users...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="./js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const authData = await window.checkAuth('admin');
            if (!authData) return;
            document.getElementById('user-email').innerText = authData.user.email;

            fetchPosts();
            fetchUsers();
        });

        async function fetchPosts() {
            try {
                const response = await fetch('/api/posts');
                if (!response.ok) throw new Error('Failed to fetch posts');
                
                let data;
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    throw new Error('Server returned non-JSON response');
                }

                const list = document.getElementById('posts-list');
                if (data.length === 0) {
                    list.innerHTML = `<p class="text-slate-400 font-medium text-center py-10">No content uploaded yet.</p>`;
                    return;
                }

                list.innerHTML = data.map(post => `
                    <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between items-center">
                        <div>
                            <p class="font-black text-slate-900 uppercase tracking-tighter">${post.title}</p>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">${post.type} • For: ${post.audience}</p>
                        </div>
                        <div class="flex gap-2">
                            ${post.file_url ? `<a href="${post.file_url}" target="_blank" class="text-indigo-600 font-bold text-xs hover:underline">VIEW</a>` : ''}
                            <button onclick="deletePost('${post.id}')" class="text-red-500 font-bold text-xs hover:underline">DELETE</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('posts-list').innerHTML = `<p class="text-red-500 font-bold text-center py-10">${err.message}</p>`;
            }
        }

        async function fetchUsers() {
            try {
                const response = await fetch('/api/users');
                if (!response.ok) throw new Error('Failed to fetch users');
                
                let data;
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    throw new Error('Server returned non-JSON response');
                }

                const list = document.getElementById('users-list');
                list.innerHTML = data.map(user => `
                    <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between items-center">
                        <div>
                            <p class="font-black text-slate-900">${user.email}</p>
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Role: ${user.role}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('users-list').innerHTML = `<p class="text-red-500 font-bold text-center py-10">${err.message}</p>`;
            }
        }

        async function deletePost(id) {
            if (!confirm('Are you sure you want to delete this content?')) return;
            try {
                const response = await fetch(`/api/posts/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Delete failed');
                fetchPosts();
            } catch (err) {
                alert(err.message);
            }
        }

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const type = document.getElementById('type').value;
            const audience = document.getElementById('audience').value;
            const file_url = document.getElementById('file_url').value;
            const btn = document.getElementById('upload-btn');
            const status = document.getElementById('upload-status');

            btn.disabled = true;
            btn.innerText = 'UPLOADING...';
            status.classList.remove('hidden');
            status.innerText = 'Processing...';

            try {
                const response = await fetch('/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, type, audience, file_url }),
                });

                if (!response.ok) throw new Error('Upload failed');

                status.innerText = 'Upload successful!';
                status.classList.add('text-green-500');
                document.getElementById('upload-form').reset();
                fetchPosts();
            } catch (err) {
                status.innerText = err.message;
                status.classList.add('text-red-500');
            } finally {
                btn.disabled = false;
                btn.innerText = 'UPLOAD';
                setTimeout(() => {
                    status.classList.add('hidden');
                    status.classList.remove('text-green-500', 'text-red-500');
                }, 3000);
            }
        });
    </script>
</body>
</html>
