<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Tech Academy - Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-indigo-50 to-slate-100 min-h-screen">
    <!-- Sidebar / Nav -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 text-indigo-600 font-extrabold text-2xl tracking-tighter">
            <span class="bg-indigo-600 text-white px-2 py-1 rounded-lg">HI</span>
            <span>TECH</span>
            <span class="text-slate-400 text-sm font-bold ml-2 uppercase tracking-widest">STUDENT</span>
        </div>
        <div class="flex items-center gap-6">
            <a href="./profile.html" class="text-slate-600 font-bold text-sm hover:text-indigo-600 transition-colors uppercase tracking-widest">Profile</a>
            <span id="user-email" class="text-slate-500 font-medium text-sm hidden md:block"></span>
            <button onclick="window.logout()" class="text-red-500 font-bold text-sm hover:text-red-700 transition-colors uppercase tracking-widest">LOGOUT</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-8">
        <!-- Announcements -->
        <div class="bg-white/80 backdrop-blur-xl p-8 rounded-[2.5rem] shadow-[0_20px_50px_rgba(99,102,241,0.05)] border border-white/20">
            <h2 class="text-2xl font-black text-slate-900 tracking-tighter mb-6 uppercase">ANNOUNCEMENTS</h2>
            <div id="announcements-list" class="space-y-4">
                <p class="text-slate-400 font-medium text-center py-10">Loading announcements...</p>
            </div>
        </div>

        <!-- Books / Materials -->
        <div class="bg-white/80 backdrop-blur-xl p-8 rounded-[2.5rem] shadow-[0_20px_50px_rgba(99,102,241,0.05)] border border-white/20">
            <h2 class="text-2xl font-black text-slate-900 tracking-tighter mb-6 uppercase">BOOKS & MATERIALS</h2>
            <div id="books-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-slate-400 font-medium text-center py-10 col-span-full">Loading materials...</p>
            </div>
        </div>

        <!-- Videos -->
        <div class="bg-white/80 backdrop-blur-xl p-8 rounded-[2.5rem] shadow-[0_20px_50px_rgba(99,102,241,0.05)] border border-white/20">
            <h2 class="text-2xl font-black text-slate-900 tracking-tighter mb-6 uppercase">VIDEO LESSONS</h2>
            <div id="videos-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-slate-400 font-medium text-center py-10 col-span-full">Loading videos...</p>
            </div>
        </div>

        <!-- Questions -->
        <div class="bg-white/80 backdrop-blur-xl p-8 rounded-[2.5rem] shadow-[0_20px_50px_rgba(99,102,241,0.05)] border border-white/20">
            <h2 class="text-2xl font-black text-slate-900 tracking-tighter mb-6 uppercase">QUESTIONS</h2>
            <div id="questions-list" class="space-y-4">
                <p class="text-slate-400 font-medium text-center py-10">Loading questions...</p>
            </div>
        </div>
    </main>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js" type="module"></script>
    <script src="./js/auth.js" type="module"></script>
    <script type="module">
        document.addEventListener('DOMContentLoaded', async () => {
            const authData = await window.checkAuth('student');
            if (!authData) return;
            document.getElementById('user-email').innerText = authData.user.email;

            fetchContent();
        });

        async function fetchContent() {
            if (!window.supabaseClient || !window.supabaseClient.auth) {
                console.error("Supabase not loaded correctly");
                return;
            }
            try {
                const { data, error } = await window.supabaseClient
                    .from('posts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const announcements = data.filter(p => p.type === 'text');
                const books = data.filter(p => p.type === 'pdf');
                const videos = data.filter(p => p.type === 'video');
                const questions = data.filter(p => p.type === 'question');

                renderAnnouncements(announcements);
                renderBooks(books);
                renderVideos(videos);
                renderQuestions(questions);
            } catch (err) {
                alert(err.message);
            }
        }

        function renderAnnouncements(items) {
            const list = document.getElementById('announcements-list');
            if (items.length === 0) {
                list.innerHTML = `<p class="text-slate-400 font-medium text-center py-10">No announcements yet.</p>`;
                return;
            }
            list.innerHTML = items.map(item => `
                <div class="p-6 bg-indigo-50 rounded-2xl border border-indigo-100">
                    <p class="font-black text-indigo-900 uppercase tracking-tighter mb-2">${item.title}</p>
                    <p class="text-indigo-600 font-medium">${item.content || ''}</p>
                    <p class="text-xs font-bold text-indigo-400 uppercase tracking-widest mt-4">${new Date(item.created_at).toLocaleDateString()}</p>
                </div>
            `).join('');
        }

        function renderBooks(items) {
            const list = document.getElementById('books-list');
            if (items.length === 0) {
                list.innerHTML = `<p class="text-slate-400 font-medium text-center py-10 col-span-full">No books available yet.</p>`;
                return;
            }
            list.innerHTML = items.map(item => `
                <div class="p-8 bg-slate-50 rounded-3xl border border-slate-100 text-center">
                    <div class="text-4xl mb-4">📚</div>
                    <h3 class="text-xl font-black text-slate-900 uppercase tracking-tighter mb-4">${item.title}</h3>
                    <a href="${item.file_url}" target="_blank" class="inline-block px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all">DOWNLOAD PDF</a>
                </div>
            `).join('');
        }

        function renderVideos(items) {
            const list = document.getElementById('videos-list');
            if (items.length === 0) {
                list.innerHTML = `<p class="text-slate-400 font-medium text-center py-10 col-span-full">No videos available yet.</p>`;
                return;
            }
            list.innerHTML = items.map(item => `
                <div class="p-8 bg-slate-50 rounded-3xl border border-slate-100 text-center">
                    <div class="text-4xl mb-4">🎥</div>
                    <h3 class="text-xl font-black text-slate-900 uppercase tracking-tighter mb-4">${item.title}</h3>
                    <a href="${item.file_url}" target="_blank" class="inline-block px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all">WATCH VIDEO</a>
                </div>
            `).join('');
        }

        function renderQuestions(items) {
            const list = document.getElementById('questions-list');
            if (items.length === 0) {
                list.innerHTML = `<p class="text-slate-400 font-medium text-center py-10">No questions yet.</p>`;
                return;
            }
            list.innerHTML = items.map(item => `
                <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="font-black text-slate-900 uppercase tracking-tighter mb-2">${item.title}</p>
                    ${item.file_url ? `<a href="${item.file_url}" target="_blank" class="text-indigo-600 font-bold text-xs hover:underline">VIEW ATTACHMENT</a>` : ''}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
