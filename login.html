<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Tech Academy - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100">
        <div class="p-10">
            <div class="flex items-center gap-2 text-indigo-600 font-extrabold text-2xl tracking-tighter mb-8 justify-center">
                <span class="bg-indigo-600 text-white px-2 py-1 rounded-lg">HI</span>
                <span>TECH</span>
            </div>
            <h2 class="text-3xl font-black text-slate-900 tracking-tighter mb-2 text-center">WELCOME BACK</h2>
            <p class="text-slate-500 font-medium text-center mb-10">Login to access your portal</p>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-widest">Email Address</label>
                    <input type="email" id="email" required class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium" placeholder="your@email.com">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-widest">Password</label>
                    <input type="password" id="password" required class="w-full px-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-medium" placeholder="••••••••">
                </div>
                <button type="submit" id="submit-btn" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-lg hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100">
                    LOGIN
                </button>
            </form>

            <div id="error-msg" class="mt-6 text-red-500 text-sm font-bold text-center hidden"></div>
            <div id="success-msg" class="mt-6 text-green-500 text-sm font-bold text-center hidden">Login successful! Redirecting...</div>

            <p class="mt-10 text-center text-slate-500 font-medium">
                Don't have an account? <a href="./signup.html" class="text-indigo-600 font-bold hover:underline">Sign up</a>
            </p>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js" type="module"></script>
    <script type="module">
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');

            submitBtn.disabled = true;
            submitBtn.innerText = 'PROCESSING...';
            errorMsg.classList.add('hidden');

            try {
                const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                    email,
                    password,
                });

                if (error) throw error;

                const role = data.user.user_metadata?.role || 'student';

                successMsg.classList.remove('hidden');
                setTimeout(() => {
                    window.location.href = `./${role}.html`;
                }, 1000);
            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerText = 'LOGIN';
            }
        });
    </script>
</body>
</html>
